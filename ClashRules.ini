[custom]
;不要随意改变关键字，否则会导致出错
;基于Clash/config/ACL4SSR_Online.ini
;去广告：支持;自动测速：支持;微软分流：支持;苹果分流：支持;增强中国IP段：不支持;增强国外GFW：不支持

