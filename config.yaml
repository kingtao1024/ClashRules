  - RULE-SET, BanAD,🛑 Reject
  - RULE-SET, BanProgramAD,🍃 应用净化
  - RULE-SET, BanEasyListChina,AdBlock
  - RULE-SET, iPhoneBlock,AdBlock

  # 自定义策略组
  - RULE-SET, MyProxiesRules,🚀 Proxies
  - RULE-SET, coinbase_domain,Binance
  - RULE-SET, binance_domain,Binance
  - RULE-SET, Hyperliquid,Binance
  - RULE-SET, bybit_domain,CEX
  - RULE-SET, kraken_domain,CEX
  - RULE-SET, ibkr_domain,CEX
  - RULE-SET, CEX,CEX
  - RULE-SET, HSBC,HSBC
  - RULE-SET, QuoteAPI,QuoteAPI

  # 常用规则集
