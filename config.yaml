proxy-providers:
  SSRDOG:
    url: "******"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: Direct
    override:
      additional-suffix: "@SSRDOG"
  ImmTelecom:
      type: file
      path: providers/ImmTelecom_Clash.yaml
      health-check:
        enable: true
        url: https://www.gstatic.com/generate_204
        interval: 300
      override:
        additional-suffix: "@IMM"
        
# 节点信息
proxies:
  - {name: Direct, type: direct}
  - {name: Reject, type: reject}

# 全局配置
port: 7890
socks-port: 7891
#redir-port: 7892
mixed-port: 7893
#tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
#global-client-fingerprint: chrome
#keep-alive-idle: 600
#keep-alive-interval: 15
#disable-keep-alive: false
profile:
  store-selected: true
  store-fake-ip: true

# 入站
# tun:
#   enable: true
#   # system/gvisor/mixed
#   stack: mixed
#   mtu: 1400
#   dns-hijack: ["any:53", "tcp://any:53"]
#   auto-route: true
#   auto-redirect: true
#   auto-detect-interface: true

# DNS模块（保持原始配置）
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:private_domain"
    - "rule-set:cn_domain"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.market.xiaomi.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
  # namesever尽量用运营商提供的DNS
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    
# 策略组
proxy-groups:
  - {name: 🚀 Proxies, type: select, proxies: [♻️ Auto, 🇭🇰 HongKong, 🇨🇳 Taiwan, 🇯🇵 Japan, 🇸🇬 Singapore, 🇺🇲 UnitedStates]}
  - {name: ♻️ Auto, type: fallback, proxies: [🇭🇰 HongKong@SSRDOG, 🇨🇳 Taiwan@SSRDOG, 🇭🇰 HongKong@IMM, 🇨🇳 Taiwan@IMM, 🇯🇵 Japan, 🇸🇬 Singapore, 🇺🇲 UnitedStates], include-all: true, url: "http://cp.cloudflare.com/generate_204", interval: 120}
  - {name: Binance, type: fallback, proxies: [🇨🇳 Taiwan@SSRDOG, 🇨🇳 Taiwan@IMM, 🇯🇵 Japan, 🇸🇬 Singapore], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Binance.png"}
  - {name: CEX, type: fallback, proxies: [🇨🇳 Taiwan@SSRDOG, 🇨🇳 Taiwan@IMM, 🇯🇵 Japan, 🇸🇬 Singapore], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Bitcoin.png"}
  - {name: HSBC, type: fallback, proxies: [🇭🇰 HongKong@SSRDOG, 🇭🇰 HongKong@IMM], icon: "https://create.hsbc/content/dam/brandhub/brand/ld-history/hexagon_1192x671.jpg"}
  - {name: QuoteAPI, type: select, proxies: [🇭🇰 HongKong@IMM-A, 🇭🇰 HongKong@IMM-B, 🇭🇰 HongKong@SSRDOG-A, 🇭🇰 HongKong@SSRDOG-B, 🇨🇳 Taiwan@IMM-A, 🇨🇳 Taiwan@IMM-B, 🇨🇳 Taiwan@SSRDOG-A, 🇨🇳 Taiwan@SSRDOG-B], icon: "https://kyber.network/media/logos/kyber-logo-mark.png"}
  - {name: Apple, type: select, proxies: [🎯 Direct, 🚀 Proxies], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Apple.png"}
  - {name: Microsoft, type: select, proxies: [🎯 Direct, 🚀 Proxies], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Microsoft.png"}
  - {name: Steam, type: select, proxies: [🚀 Proxies, 🎯 Direct], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Steam.png"}
  - {name: YouTube, type: select, proxies: [🚀 Proxies, 🇭🇰 HongKong@SSRDOG, 🇨🇳 Taiwan@SSRDOG, 🇭🇰 HongKong@IMM, 🇨🇳 Taiwan@IMM], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/YouTube.png"}
  - {name: Telegram, type: select, proxies: [🚀 Proxies, 🇭🇰 HongKong@SSRDOG, 🇨🇳 Taiwan@SSRDOG, 🇭🇰 HongKong@IMM, 🇨🇳 Taiwan@IMM], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Telegram.png"} 
  - {name: AI, type: select, proxies: [🚀 Proxies, 🇭🇰 HongKong@SSRDOG, 🇨🇳 Taiwan@SSRDOG, 🇭🇰 HongKong@IMM, 🇨🇳 Taiwan@IMM], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/AI.png"}
  - {name: 🎯 Direct, type: select, proxies: [Direct, 🚀 Proxies, ♻️ Auto]}
  - {name: 🛑 Reject, type: select, proxies: [Reject, Direct]}
  - {name: 🍃 应用净化, type: select, proxies: [Reject, Direct]}
  - {name: AdBlock, type: select, proxies: [Reject, Direct], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Adblock.png"}
  - {name: 🐟 Others, type: select, proxies: [🚀 Proxies, 🎯 Direct, ♻️ Auto], include-all: true}

  # 地区自动测速组
  # 合并所有机场
  - {name: 🇭🇰 HongKong, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(港|HK|香港|(?i)Hong))^((?!(台|日|韩|新|美)).)*$"}
  - {name: 🇨🇳 Taiwan, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(台|台湾|TW|(?i)Taiwan))^((?!(港|日|韩|新|美)).)*$"}
  - {name: 🇯🇵 Japan, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(日|日本|JP|(?i)Japan))^((?!(港|台|韩|新|美|尼)).)*$" }
  - {name: 🇸🇬 Singapore, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(新加坡|SG|坡|狮城|Singapore))^((?!(港|台|韩|日|美)).)*$" }
  - {name: 🇺🇲 UnitedStates, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(美|美国|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"}

  # SSRDOG
  - {name: 🇭🇰 HongKong@SSRDOG, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(港|HK|香港|(?i)Hong))(?=.*SSRDOG)^((?!(台|日|韩|新|美)).)*$"}
  - {name: 🇨🇳 Taiwan@SSRDOG, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(台|台湾|TW|(?i)Taiwan))(?=.*SSRDOG)^((?!(港|日|韩|新|美)).)*$"}
  - {name: 🇯🇵 Japan@SSRDOG, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(日|日本|JP|(?i)Japan))(?=.*SSRDOG)^((?!(港|台|韩|新|美|尼)).)*$" }
  - {name: 🇸🇬 Singapore@SSRDOG, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(新加坡|SG|坡|狮城|Singapore))(?=.*SSRDOG)^((?!(港|台|韩|日|美)).)*$" }
  - {name: 🇺🇲 UnitedStates@SSRDOG, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(美|美国|US|(?i)States|America))(?=.*SSRDOG)^((?!(港|台|日|韩|新)).)*$"}

  # IMM
  - {name: 🇭🇰 HongKong@IMM, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(港|HK|香港|(?i)Hong))(?=.*IMM)^((?!(台|日|韩|新|美)).)*$"}
  - {name: 🇨🇳 Taiwan@IMM, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(台|台湾|TW|(?i)Taiwan))(?=.*IMM)^((?!(港|日|韩|新|美)).)*$"}
  - {name: 🇯🇵 Japan@IMM, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(日|日本|JP|(?i)Japan))(?=.*IMM)^((?!(港|台|韩|新|美|尼)).)*$" }
  - {name: 🇸🇬 Singapore@IMM, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(新加坡|SG|坡|狮城|Singapore))(?=.*IMM)^((?!(港|台|韩|日|美)).)*$" }
  - {name: 🇺🇲 UnitedStates@IMM, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(美|美国|US|(?i)States|America))(?=.*IMM)^((?!(港|台|日|韩|新)).)*$"}

  # HK分组
  - {name: 🇭🇰 HongKong@SSRDOG-A, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(港|HK|香港|(?i)Hong))(?=.*SSRDOG)(?=.*(0[1-5]))^((?!(台|日|韩|新|美)).)*$"}
  - {name: 🇭🇰 HongKong@SSRDOG-B, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(港|HK|香港|(?i)Hong))(?=.*SSRDOG)(?=.*(0[6-9]|10))^((?!(台|日|韩|新|美)).)*$"}
  - {name: 🇭🇰 HongKong@IMM-A, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(港|HK|香港|(?i)Hong))(?=.*IMM)(?=.*(0[1-9]|10))^((?!(台|日|韩|新|美)).)*$"}
  - {name: 🇭🇰 HongKong@IMM-B, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(港|HK|香港|(?i)Hong))(?=.*IMM)(?=.*(1[1-9]|20))^((?!(台|日|韩|新|美)).)*$"}
  
  # TW分组
  - {name: 🇨🇳 Taiwan@SSRDOG-A, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(台|台湾|TW|(?i)Taiwan))(?=.*SSRDOG)(?=.*(0[1-3]))^((?!(港|日|韩|新|美)).)*$"}
  - {name: 🇨🇳 Taiwan@SSRDOG-B, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(台|台湾|TW|(?i)Taiwan))(?=.*SSRDOG)(?=.*(0[4-5]))^((?!(港|日|韩|新|美)).)*$"}
  - {name: 🇨🇳 Taiwan@IMM-A, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(台|台湾|TW|(?i)Taiwan))(?=.*IMM)(?=.*(0[1-3]))^((?!(港|日|韩|新|美)).)*$"}
  - {name: 🇨🇳 Taiwan@IMM-B, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(台|台湾|TW|(?i)Taiwan))(?=.*IMM)(?=.*(0[4-5]))^((?!(港|日|韩|新|美)).)*$"}


